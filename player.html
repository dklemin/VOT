<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOT Player</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #video-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #000; }
        video { width: 100%; max-height: 100%; object-fit: contain; }
        #info-panel { background: #1a1a1a; padding: 10px 14px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #333; min-height: 48px; flex-shrink: 0; }
        #url-display { flex: 1; font-size: 12px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; user-select: all; word-break: break-all; }
        .copy-btn { background: #333; border: 1px solid #555; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; white-space: nowrap; flex-shrink: 0; }
        .copy-btn:active { background: #555; }
        #error-msg { color: #f44; font-size: 13px; text-align: center; padding: 20px; display: none; }
    </style>
</head>
<body>
    <div id="video-container">
        <video id="video" controls playsinline webkit-playsinline></video>
        <div id="error-msg"></div>
    </div>
    <div id="info-panel">
        <span style="color:#4CAF50;font-weight:bold;font-size:12px;flex-shrink:0;">SRC:</span>
        <div id="url-display">Ожидание...</div>
        <button class="copy-btn" id="copyBtn">COPY</button>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const videoUrl = params.get('url');
        const video = document.getElementById('video');
        const urlDisplay = document.getElementById('url-display');
        const copyBtn = document.getElementById('copyBtn');
        const errorMsg = document.getElementById('error-msg');

        if (videoUrl) {
            const decodedUrl = decodeURIComponent(videoUrl);
            video.src = decodedUrl;
            urlDisplay.textContent = decodedUrl;
            video.play().catch(() => {});
            video.addEventListener('error', () => {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Ошибка загрузки видео. Попробуйте скопировать ссылку и открыть напрямую.';
            });
        } else {
            errorMsg.style.display = 'block';
            errorMsg.textContent = 'Не передан параметр ?url=';
            urlDisplay.textContent = 'Нет ссылки';
        }

        copyBtn.addEventListener('click', () => {
            const text = videoUrl ? decodeURIComponent(videoUrl) : '';
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => {
                copyBtn.textContent = 'COPIED!';
                setTimeout(() => copyBtn.textContent = 'COPY', 2000);
            }).catch(() => {
                urlDisplay.select?.();
                document.execCommand?.('copy');
                copyBtn.textContent = 'COPIED!';
                setTimeout(() => copyBtn.textContent = 'COPY', 2000);
            });
        });
    </script>
</body>
</html>
