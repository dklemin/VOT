<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOT External Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; }
        #container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; }
        #video-frame { flex: 1; width: 100%; border: none; background: #000; }
        #info-panel { 
            background: #1a1a1a; color: #fff; padding: 10px; font-size: 12px; 
            display: flex; align-items: center; gap: 10px; min-height: 40px;
        }
        #url-display { 
            flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            color: #aaa; user-select: all; 
        }
        .copy-btn { 
            background: #333; border: 1px solid #555; color: #fff; padding: 5px 10px; 
            border-radius: 4px; cursor: pointer; font-size: 11px; 
        }
        .copy-btn:active { background: #555; }
    </style>
</head>
<body>
    <div id="container">
        <!-- Фрейм с видео. VOT должен матчиться на этот домен, чтобы работать внутри -->
        <iframe id="video-frame" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
        
        <div id="info-panel">
            <span style="color:#4CAF50; font-weight:bold;">SOURCE:</span>
            <div id="url-display">Ожидание ссылки...</div>
            <button class="copy-btn" onclick="copyUrl()">COPY</button>
        </div>
    </div>

    <script>
        function getParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        const videoUrl = getParam('url');
        const frame = document.getElementById('video-frame');
        const urlDisplay = document.getElementById('url-display');

        if (videoUrl) {
            // Для прямых ссылок на mp4/webm создаем простой HTML внутри iframe
            // Чтобы VOT мог зацепиться, мы можем либо грузить напрямую, либо обернуть
            // Прямая загрузка mp4 в iframe обычно работает
            frame.src = videoUrl;
            urlDisplay.textContent = decodeURIComponent(videoUrl);
        } else {
            urlDisplay.textContent = "Ошибка: Не передан параметр ?url=";
        }

        function copyUrl() {
            if (!videoUrl) return;
            navigator.clipboard.writeText(decodeURIComponent(videoUrl)).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = 'COPIED!';
                setTimeout(() => btn.textContent = 'COPY', 2000);
            });
        }
    </script>
</body>
</html>
