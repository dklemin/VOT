<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VOT Player</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: #0a0a0a; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro", sans-serif; height: 100vh; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        #input-bar { background: #1a1a2e; padding: 10px; display: flex; gap: 8px; align-items: center; border-bottom: 1px solid #333; flex-shrink: 0; }
        #urlInput { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #444; background: #2a2a3e; color: #e0e0e0; font-size: 13px; font-family: "SF Mono", Menlo, monospace; outline: none; min-width: 0; }
        #urlInput:focus { border-color: #4a9eff; }
        #urlInput::placeholder { color: #666; }
        .btn { padding: 10px 14px; border-radius: 8px; border: none; font-weight: 600; font-size: 13px; cursor: pointer; flex-shrink: 0; white-space: nowrap; }
        .btn-primary { background: #4a9eff; color: #fff; }
        .btn-secondary { background: #333; border: 1px solid #444; color: #ccc; }
        .btn:active { opacity: 0.7; }
        #src-bar { background: #141420; padding: 8px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #333; flex-shrink: 0; min-height: 40px; }
        #url-display { flex: 1; font-size: 11px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: "SF Mono", Menlo, monospace; user-select: all; min-width: 0; }
        #video-area { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; position: relative; overflow: hidden; min-height: 0; }
        #video-wrap { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; max-height: 100%; object-fit: contain; }
        #placeholder { color: #555; text-align: center; padding: 20px; position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        #placeholder .icon { font-size: 48px; margin-bottom: 12px; }
        #placeholder .hint { color: #666; font-size: 13px; margin-top: 8px; }
        #error-bar { background: #3a1a1a; padding: 10px 14px; color: #ff6b6b; font-size: 13px; border-bottom: 1px solid #5a2a2a; display: none; }
        #extract-status { color: #4a9eff; font-size: 11px; padding: 4px 12px; background: #1a1a2e; border-bottom: 1px solid #333; display: none; }
        #vot-init-indicator { position: fixed; top: 10px; right: 10px; background: #30d158; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; z-index: 9999; display: none; }
    </style>
</head>
<body>
    <div id="vot-init-indicator">VOT Ready</div>
    <div id="input-bar">
        <input type="url" id="urlInput" placeholder="URL видео или страницы с видео...">
        <button class="btn btn-primary" id="loadBtn">▶</button>
        <button class="btn btn-secondary" id="extractBtn" title="Извлечь из страницы">🔍</button>
    </div>
    <div id="extract-status"></div>
    <div id="src-bar">
        <span style="color:#4a9eff; font-size:11px; flex-shrink:0;">SRC:</span>
        <div id="url-display">Нет источника</div>
        <button class="btn btn-secondary" id="copyBtn" style="padding:6px 10px;font-size:11px;">📋</button>
        <button class="btn btn-secondary" id="openDirectBtn" style="padding:6px 10px;font-size:11px;display:none;">↗</button>
    </div>
    <div id="error-bar"></div>
    <div id="video-area">
        <div id="video-wrap">
            <video id="player-video" controls playsinline webkit-playsinline controlslist="nodownload" style="display:none;"></video>
            <div id="placeholder">
                <div class="icon">🎬</div>
                <div>Вставьте ссылку на видео или страницу</div>
                <div class="hint">.mp4, .webm, .m3u8 — или страница, откуда извлечь</div>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const loadBtn = document.getElementById('loadBtn');
        const extractBtn = document.getElementById('extractBtn');
        const videoWrap = document.getElementById('video-wrap');
        const placeholder = document.getElementById('placeholder');
        const urlDisplay = document.getElementById('url-display');
        const copyBtn = document.getElementById('copyBtn');
        const openDirectBtn = document.getElementById('openDirectBtn');
        const errorBar = document.getElementById('error-bar');
        const extractStatus = document.getElementById('extract-status');
        const video = document.getElementById('player-video');
        const votIndicator = document.getElementById('vot-init-indicator');

        let currentUrl = '';

        // Индикатор для VOT
        window.__votPlayerHtmlReady = true;
        console.log('[Player.html] Page loaded, VOT ready flag set');

        function showError(msg) { errorBar.textContent = '⚠ ' + msg; errorBar.style.display = 'block'; }
        function hideError() { errorBar.style.display = 'none'; }
        function showExtract(msg) { extractStatus.textContent = msg; extractStatus.style.display = 'block'; }
        function hideExtract() { extractStatus.style.display = 'none'; }

        function loadVideo(url) {
            if (!url) return;
            hideError(); hideExtract();
            currentUrl = url;
            urlDisplay.textContent = url;
            openDirectBtn.style.display = 'block';
            placeholder.style.display = 'none';
            video.style.display = 'block';

            video.addEventListener('error', () => {
                const err = video.error;
                const messages = { 1: 'Загрузка прервана', 2: 'Ошибка сети', 3: 'Ошибка декодирования', 4: 'Формат не поддерживается' };
                showError(messages[err?.code] || 'Ошибка загрузки (код: ' + (err?.code || '?') + ')');
            }, { once: true });

            video.src = url;
            
            // Принудительно триггерим события для VOT
            video.addEventListener('loadedmetadata', () => {
                console.log('[Player.html] Video metadata loaded, VOT should detect it now');
                votIndicator.style.display = 'block';
                setTimeout(() => votIndicator.style.display = 'none', 3000);
            }, { once: true });

            video.play().catch(() => {});
        }

        async function extractFromPage(pageUrl) {
            showExtract('🔍 Извлекаю видео со страницы...');
            try {
                const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(pageUrl);
                let response;
                try { response = await fetch(proxyUrl); } catch { response = await fetch(pageUrl); }
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const html = await response.text();
                
                const found = [];
                const ogRegex = /<meta[^>]+property=["']og:video(?::url|:secure_url)?["'][^>]+content=["']([^"']+)["']/gi;
                let match;
                while ((match = ogRegex.exec(html)) !== null) found.push(match[1]);
                
                const ogRegex2 = /<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:video(?::url|:secure_url)?["']/gi;
                while ((match = ogRegex2.exec(html)) !== null) found.push(match[1]);
                
                const jsonLdRegex = /<script[^>]+type=["']application\/ld\+json["'][^>]*>([\s\S]*?)<\/script>/gi;
                while ((match = jsonLdRegex.exec(html)) !== null) {
                    try {
                        const data = JSON.parse(match[1]);
                        const extract = (obj) => {
                            if (!obj || typeof obj !== 'object') return;
                            if (obj.contentUrl) found.push(obj.contentUrl);
                            if (obj.embedUrl) found.push(obj.embedUrl);
                            if (Array.isArray(obj)) obj.forEach(extract);
                            Object.values(obj).forEach(v => { if (typeof v === 'object') extract(v); });
                        };
                        extract(data);
                    } catch {}
                }
                
                const directRegex = /(https?:\/\/[^"'\s<>]+\.(mp4|m3u8|webm)(\?[^"'\s<>]*)?)/gi;
                while ((match = directRegex.exec(html)) !== null) found.push(match[1]);
                
                const unique = [...new Set(found)].filter(u => u && !u.startsWith('data:') && u.length < 1000);
                
                if (unique.length === 0) {
                    showExtract('❌ Видео не найдено на странице');
                    setTimeout(hideExtract, 3000);
                    return;
                }
                
                if (unique.length === 1) {
                    urlInput.value = unique[0];
                    loadVideo(unique[0]);
                    showExtract('✅ Найдено 1 видео');
                } else {
                    showExtract('✅ Найдено ' + unique.length + ' видео. Выберите:');
                    const select = document.createElement('select');
                    select.style.cssText = 'margin:4px 12px;padding:6px;background:#2a2a3e;color:#fff;border:1px solid #444;border-radius:6px;width:calc(100% - 24px);font-size:12px;';
                    unique.forEach((u, i) => {
                        const opt = document.createElement('option');
                        const ext = u.match(/\.([a-z0-9]+)(?:\?|$)/i)?.[1] || 'link';
                        opt.value = u;
                        opt.textContent = '#' + (i+1) + ' [' + ext.toUpperCase() + '] ' + (u.length > 70 ? u.substring(0, 67) + '...' : u);
                        select.appendChild(opt);
                    });
                    select.onchange = () => {
                        urlInput.value = select.value;
                        loadVideo(select.value);
                        select.remove();
                        hideExtract();
                    };
                    extractStatus.parentElement.insertBefore(select, extractStatus.nextSibling);
                }
                setTimeout(hideExtract, 5000);
            } catch (err) {
                showExtract('❌ Ошибка: ' + err.message);
                setTimeout(hideExtract, 4000);
            }
        }

        function handleLoad() {
            const url = urlInput.value.trim();
            if (!url) { showError('Введите ссылку'); return; }
            
            if (/\.(mp4|webm|m3u8|m4v|mpd)(\?|$)/i.test(url)) {
                loadVideo(url);
            } else {
                extractFromPage(url);
            }
            const newUrl = new URL(window.location.href);
            newUrl.searchParams.set('url', url);
            window.history.replaceState({}, '', newUrl);
        }

        loadBtn.addEventListener('click', handleLoad);
        extractBtn.addEventListener('click', () => {
            const url = urlInput.value.trim();
            if (!url) { showError('Введите URL страницы'); return; }
            extractFromPage(url);
        });
        urlInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLoad(); });

        copyBtn.addEventListener('click', () => {
            if (!currentUrl) return;
            navigator.clipboard.writeText(currentUrl).then(() => {
                copyBtn.textContent = '✓';
                setTimeout(() => copyBtn.textContent = '📋', 1500);
            }).catch(() => {
                copyBtn.textContent = '✓';
                setTimeout(() => copyBtn.textContent = '📋', 1500);
            });
        });

        openDirectBtn.addEventListener('click', () => { if (currentUrl) window.open(currentUrl, '_blank'); });

        const params = new URLSearchParams(window.location.search);
        const paramUrl = params.get('url');
        if (paramUrl) {
            try {
                const decoded = decodeURIComponent(paramUrl);
                urlInput.value = decoded;
                if (/\.(mp4|webm|m3u8|m4v|mpd)(\?|$)/i.test(decoded)) {
                    loadVideo(decoded);
                } else {
                    extractFromPage(decoded);
                }
            } catch { urlInput.value = paramUrl; }
        }
    </script>
</body>
</html>
